<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="تدرج — منصة الطالب السعودي الأكاديمية" />
  <title>تدرج | Tadarruj</title>
  <!--
    CSS is inlined below — works in any environment (file://, sandboxed preview, offline).
    No external file dependency. The stylesheet is identical to styles.css.
  -->
  <style>
/* ════════════════════════════════════════════════════════════
   TADARRUJ — styles.css  (Refactored & Fixed)
   ─ Offline-safe (zero CDN, zero @import)
   ─ Professional, modern, responsive landing page
   ════════════════════════════════════════════════════════════ */


/* ─── 1. DESIGN TOKENS ───────────────────────────────────── */
:root {
  /* Blue palette */
  --b50:  #eef3ff;
  --b100: #dde8ff;
  --b200: #b8cfff;
  --b300: #7aaaff;
  --b400: #5b8cf8;
  --b500: #3a6ef0;
  --b600: #2c5ee8;
  --b700: #1e46c0;
  --b800: #163599;
  --b900: #0d1f5c;

  /* Neutral palette */
  --n0:   #ffffff;
  --n50:  #f8fafc;
  --n100: #f1f5f9;
  --n200: #e2e8f0;
  --n300: #cbd5e1;
  --n400: #94a3b8;
  --n500: #64748b;
  --n600: #475569;
  --n700: #334155;
  --n800: #1e293b;
  --n900: #0f172a;

  /* Semantic aliases */
  --bg:       var(--n50);
  --surface:  var(--n0);
  --surface2: var(--n100);
  --border:   var(--n200);
  --text:     var(--n900);
  --text2:    var(--n600);
  --text3:    var(--n400);
  --primary:      var(--b600);
  --primary-dark: var(--b700);
  --primary-lite: var(--b100);

  /* Status */
  --green:   #22c55e; --green-l:  #dcfce7; --green-d:  #166534;
  --yellow:  #f59e0b; --yellow-l: #fef3c7; --yellow-d: #92400e;
  --red:     #ef4444; --red-l:    #fee2e2; --red-d:    #991b1b;
  --teal:    #0d9488; --teal-l:   #ccfbf1;

  /* Radii */
  --r-xs:   4px;
  --r-sm:   8px;
  --r-md:   12px;
  --r-lg:   16px;
  --r-xl:   20px;
  --r-2xl:  28px;
  --r-full: 9999px;

  /* Shadows */
  --sh-xs: 0 1px 3px rgba(15,23,42,.07), 0 1px 2px rgba(15,23,42,.04);
  --sh-sm: 0 2px 8px rgba(44,94,232,.09), 0 1px 3px rgba(15,23,42,.05);
  --sh-md: 0 4px 20px rgba(44,94,232,.13), 0 2px 8px rgba(15,23,42,.06);
  --sh-lg: 0 12px 48px rgba(44,94,232,.17), 0 4px 16px rgba(15,23,42,.08);

  /* Layout */
  --nav-h:       64px;
  --container-w: 1160px;

  /* Motion */
  --ease: cubic-bezier(.4, 0, .2, 1);
  --dur:  .22s;

  /* Font stack (Arabic-first, offline-safe) */
  --font-base:
    'Segoe UI', 'Tahoma', 'Arial Unicode MS',
    system-ui, -apple-system, BlinkMacSystemFont,
    sans-serif;
}


/* ─── 2. CSS RESET ───────────────────────────────────────── */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin:  0;
  padding: 0;
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

/* Absolute list reset — no bullets, no indent, ever */
ul,
ol {
  list-style: none;
  padding: 0;
  margin:  0;
}

a {
  color: inherit;
  text-decoration: none;
}

img,
svg {
  display: block;
  max-width: 100%;
}

button {
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  color: inherit;
}

input, select, textarea {
  font-family: inherit;
  font-size: inherit;
}

/* Remove default details disclosure triangle */
details > summary { list-style: none; }
details > summary::-webkit-details-marker { display: none; }


/* ─── 3. BASE ────────────────────────────────────────────── */
body {
  font-family: var(--font-base);
  background-color: var(--bg);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

h1, h2, h3, h4, h5 {
  font-weight: 700;
  line-height: 1.25;
  color: var(--text);
}

p {
  color: var(--text2);
  line-height: 1.75;
}




/* ─── 5. LAYOUT HELPERS ──────────────────────────────────── */
.container {
  width: 100%;
  max-width: var(--container-w);
  margin-inline: auto;       /* logical-property centering */
  padding-inline: 2rem;      /* side padding */
}


/* ─── 6. BUTTONS ─────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .45rem;
  font-family: inherit;
  font-size: .95rem;
  font-weight: 600;
  padding: .6rem 1.4rem;
  border-radius: var(--r-md);
  border: 2px solid transparent;
  white-space: nowrap;
  cursor: pointer;
  line-height: 1;
  transition:
    background var(--dur) var(--ease),
    color      var(--dur) var(--ease),
    border-color var(--dur) var(--ease),
    box-shadow   var(--dur) var(--ease),
    transform    var(--dur) var(--ease);
}

.btn:focus-visible {
  outline: 3px solid var(--b400);
  outline-offset: 3px;
}

.btn:disabled {
  opacity: .45;
  cursor: not-allowed;
  transform: none !important;
}

/* Primary */
.btn-primary {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 16px rgba(44,94,232,.28);
}
.btn-primary:hover:not(:disabled) {
  background: var(--primary-dark);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(44,94,232,.36);
}
.btn-primary:active:not(:disabled) { transform: none; }

/* Secondary */
.btn-secondary {
  background: var(--surface);
  color: var(--primary);
  border-color: var(--border);
  box-shadow: var(--sh-xs);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--primary-lite);
  border-color: var(--b200);
}

/* Ghost */
.btn-ghost {
  background: transparent;
  color: var(--text2);
}
.btn-ghost:hover:not(:disabled) {
  background: var(--surface2);
  color: var(--text);
}

/* White (on dark bg) */
.btn-white {
  background: #fff;
  color: var(--primary);
  box-shadow: var(--sh-sm);
}
.btn-white:hover:not(:disabled) {
  background: var(--b50);
  transform: translateY(-1px);
  box-shadow: var(--sh-md);
}

/* Outline-white (on dark bg) */
.btn-outline-white {
  background: transparent;
  color: #fff;
  border-color: rgba(255,255,255,.38);
}
.btn-outline-white:hover:not(:disabled) {
  background: rgba(255,255,255,.1);
  border-color: rgba(255,255,255,.7);
}

/* Sizes */
.btn-sm { padding: .38rem .9rem;  font-size: .82rem; border-radius: var(--r-sm); }
.btn-lg { padding: .82rem 2rem;   font-size: 1.05rem; }


/* ─── 7. BADGES ──────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .03em;
  padding: .22rem .65rem;
  border-radius: var(--r-full);
}

.badge-green  { background: var(--green-l);  color: var(--green-d); }
.badge-yellow { background: var(--yellow-l); color: var(--yellow-d); }
.badge-red    { background: var(--red-l);    color: var(--red-d); }
.badge-blue   { background: var(--b100);     color: var(--b700); }
.badge-teal   { background: var(--teal-l);   color: var(--teal); }
.badge-gray   { background: var(--n200);     color: var(--n700); }
.badge-mt     { margin-top: .5rem; }


/* ─── 8. PILL / EYEBROW ──────────────────────────────────── */
.pill {
  display: inline-block;
  font-size: .8rem;
  font-weight: 600;
  color: var(--primary);
  background: var(--primary-lite);
  padding: .32rem 1rem;
  border-radius: var(--r-full);
  border: 1px solid var(--b200);
  margin-bottom: 1.25rem;
}

.eyebrow {
  display: inline-block;
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--primary);
  background: var(--primary-lite);
  padding: .28rem .85rem;
  border-radius: var(--r-full);
  margin-bottom: .85rem;
}


/* ─── 9. NAVBAR ──────────────────────────────────────────── */
.nav-header {
  position: fixed;
  top: 0;
  inset-inline: 0;
  height: var(--nav-h);
  z-index: 900;
  background: rgba(248,250,252,.92);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid transparent;
  transition:
    border-color var(--dur) var(--ease),
    box-shadow   var(--dur) var(--ease);
}

.nav-header.scrolled {
  border-bottom-color: var(--border);
  box-shadow: var(--sh-xs);
}

/*
  3-COLUMN GRID LAYOUT
  ────────────────────
  [logo col]  [centered nav col]  [actions col]

  - Column 1 (logo): auto-width, sits on the inline-start edge
  - Column 2 (nav):  1fr, fills remaining space, links centered inside
  - Column 3 (actions): auto-width, sits on the inline-end edge

  In RTL: inline-start = right, inline-end = left
  → Logo on the right, actions on the left, links stay centered ✓

  In LTR: inline-start = left, inline-end = right
  → Logo on the left, actions on the right, links stay centered ✓

  No JS or dir-specific overrides needed.
*/
.nav-inner {
  height: var(--nav-h);
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 0; /* gaps handled per-column with padding */
}

/* Col 1 — Logo */
.nav-col-logo {
  display: flex;
  align-items: center;
  padding-inline-end: 1.5rem; /* space between logo and center col */
}

/* Col 2 — Centered links */
.nav-col-links {
  display: flex;
  align-items: center;
  justify-content: center; /* THIS is what truly centers the links */
  height: 100%;
  overflow: hidden;         /* prevent overflow on tight screens */
}

/* Col 3 — Actions */
.nav-col-actions {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding-inline-start: 1.5rem; /* space between center col and actions */
}

/* ── Brand mark ── */
.brand {
  display: inline-flex;
  align-items: baseline;
  gap: .4rem;
  font-weight: 900;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.brand-ar  { color: var(--primary); }
.brand-sep { color: var(--text3); font-weight: 300; }
.brand-en  { color: var(--text2); font-size: .88rem; font-weight: 300; font-style: italic; }

/* ── Desktop nav links ── */
.nav-links {
  display: flex;
  align-items: center;
  gap: .2rem;
  /* No flex:1 here — centering is done by the parent .nav-col-links */
}

.nav-link {
  font-size: .88rem;
  font-weight: 500;
  color: var(--text2);
  padding: .38rem .72rem;
  border-radius: var(--r-sm);
  transition: color var(--dur) var(--ease), background var(--dur) var(--ease);
  white-space: nowrap;
}
.nav-link:hover,
.nav-link.active {
  color: var(--primary);
  background: var(--primary-lite);
}

/* ── Language toggle ── */
.lang-btn {
  font-size: .78rem;
  font-weight: 700;
  color: var(--text2);
  padding: .35rem .88rem;
  border-radius: var(--r-full);
  border: 1.5px solid var(--border);
  background: var(--surface);
  letter-spacing: .04em;
  transition: all var(--dur) var(--ease);
}
.lang-btn:hover {
  color: var(--primary);
  border-color: var(--primary);
  background: var(--primary-lite);
}
.lang-btn:focus-visible {
  outline: 3px solid var(--b400);
  outline-offset: 2px;
}

/* ── Visibility helpers ── */
/* Desktop-only: shown ≥768px, hidden on mobile */
.nav-desktop-only { display: flex; }
/* Mobile-only: shown <768px, hidden on desktop */
.nav-mobile-only  { display: none; }

/* ── Hamburger burger button ── */
.burger {
  flex-direction: column;
  gap: 5px;
  padding: .38rem;
  border-radius: var(--r-sm);
  transition: background var(--dur) var(--ease);
}
.burger:hover { background: var(--surface2); }
.burger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
}
.burger[aria-expanded="true"] span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.burger[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
.burger[aria-expanded="true"] span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }


/* ─── 10. MOBILE DRAWER ──────────────────────────────────── */
/*
  Dropdown drawer that falls below the navbar.
  RTL-aware: text-align follows the document dir automatically
  because we use logical properties + text-align: start (= right in RTL).
*/
.mobile-drawer {
  position: fixed;
  top: var(--nav-h);
  inset-inline: 0;
  z-index: 899;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: .75rem 1.25rem 1.5rem;
  box-shadow: var(--sh-md);

  /* Hidden state: slide up + fade */
  transform: translateY(-6px);
  opacity: 0;
  pointer-events: none;
  visibility: hidden;
  transition:
    transform  .2s var(--ease),
    opacity    .2s var(--ease),
    visibility .2s var(--ease);
}

.mobile-drawer.open {
  transform: translateY(0);
  opacity: 1;
  pointer-events: all;
  visibility: visible;
}

/* Backdrop for click-outside-to-close */
.drawer-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 898;
  background: transparent;
}
.drawer-backdrop.open { display: block; }

/* Nav list inside drawer */
.drawer-nav-list {
  display: flex;
  flex-direction: column;
  gap: .2rem;
  margin-bottom: .85rem;
  padding-bottom: .85rem;
  border-bottom: 1px solid var(--border);
}

.drawer-link {
  display: block;
  padding: .65rem .9rem;
  border-radius: var(--r-md);
  font-size: .95rem;
  font-weight: 500;
  color: var(--text2);
  /* text-align: start = right in RTL, left in LTR — native feel */
  text-align: start;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}
.drawer-link:hover { background: var(--surface2); color: var(--primary); }
.drawer-link.active { color: var(--primary); background: var(--primary-lite); }

/* Footer row: lang toggle + CTA */
.drawer-footer {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding-top: .1rem;
  /* In RTL: flex items flow right→left naturally */
}

/* Lang button inside drawer — same style as desktop */
.drawer-lang-btn {
  flex-shrink: 0;
}

/* CTA inside drawer */
.drawer-cta {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* Body scroll lock when drawer is open */
body.drawer-open {
  overflow: hidden;
  /* Prevent content jump on scrollbar disappearance */
  padding-inline-end: var(--scrollbar-w, 0px);
}


/* ─── 11. HERO SECTION ───────────────────────────────────── */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  /* Offset for sticky navbar */
  padding-block-start: var(--nav-h);
  overflow: hidden;
  /* Subtle warm-blue background */
  background: linear-gradient(160deg, var(--n0) 0%, var(--b50) 60%, var(--n50) 100%);
}

/* Ambient glow */
.hero-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 70% 60% at 75% 25%, rgba(91,140,248,.15) 0%, transparent 65%),
    radial-gradient(ellipse 50% 50% at 15% 75%, rgba(184,207,255,.18) 0%, transparent 65%);
}

/*
  KEY FIX: hero-grid is the 2-column layout container.
  It must be display:grid with two equal-ish columns.
  max-width + margin:auto come from .container.
*/
.hero-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
  padding-block: 5rem 4rem;
}

/* Text column */
.hero-copy {
  display: flex;
  flex-direction: column;
  align-items: flex-start;   /* RTL: start = right */
}

/* Heading */
.hero-copy h1 {
  display: flex;
  flex-direction: column;
  gap: .3rem;
  margin-bottom: 1.1rem;
}

.hero-name {
  font-size: clamp(2.8rem, 5.5vw, 4.4rem);
  font-weight: 900;
  line-height: 1.05;
  background: linear-gradient(135deg, var(--b700) 0%, var(--b400) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  color: var(--b700); /* fallback */
}

.hero-tagline {
  font-size: clamp(1.05rem, 2.3vw, 1.4rem);
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  background: none;
  -webkit-background-clip: unset;
  -webkit-text-fill-color: unset;
  background-clip: unset;
}

.hero-sub {
  font-size: 1rem;
  color: var(--text2);
  max-width: 440px;
  line-height: 1.8;
  margin-bottom: 2rem;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: .85rem;
  margin-bottom: 2.5rem;
}

/* Trust stats row */
.trust-row {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.trust-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.trust-stat strong {
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}
.trust-stat span {
  font-size: .74rem;
  color: var(--text3);
}

.trust-divider {
  width: 1px;
  height: 32px;
  background: var(--border);
}

/* Visual column */
.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
}


/* ─── 12. PREVIEW CARD ───────────────────────────────────── */
.preview-card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-2xl);
  padding: 1.5rem;
  box-shadow: var(--sh-lg);
  animation: card-float 5s ease-in-out infinite;
}

@keyframes card-float {
  0%, 100% { transform: translateY(0);   }
  50%       { transform: translateY(-9px); }
}

/* macOS-style title bar */
.mac-bar {
  display: flex;
  align-items: center;
  gap: .4rem;
  margin-bottom: 1.25rem;
  padding-bottom: .9rem;
  border-bottom: 1px solid var(--border);
}

.mac-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.dot-red    { background: #ff5f57; }
.dot-yellow { background: #febc2e; }
.dot-green  { background: #28c840; }

.mac-label {
  font-size: .78rem;
  color: var(--text3);
  margin-inline-start: auto;
}

/* Feature list */
.feat-list {
  display: flex;
  flex-direction: column;
  gap: .5rem;
  margin-bottom: 1.25rem;
}

.feat-item {
  display: flex;
  align-items: center;
  gap: .7rem;
  padding: .5rem .6rem;
  border-radius: var(--r-md);
  transition: background var(--dur) var(--ease);
}
.feat-item:hover { background: var(--surface2); }

.feat-icon {
  font-size: 1.15rem;
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: var(--r-sm);
  background: var(--primary-lite);
  display: flex;
  align-items: center;
  justify-content: center;
}

.feat-text { flex: 1; min-width: 0; }

.feat-name {
  font-size: .83rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.feat-desc {
  font-size: .72rem;
  color: var(--text3);
  margin-top: 1px;
}


/* ─── 13. PROGRESS BARS ──────────────────────────────────── */
.prog-row { margin-bottom: .8rem; }

.prog-labels {
  display: flex;
  justify-content: space-between;
  font-size: .77rem;
  font-weight: 500;
  margin-bottom: .3rem;
}
.prog-labels span:first-child { color: var(--text2); }
.prog-labels span:last-child  { color: var(--primary); font-weight: 700; }

.prog-track {
  height: 7px;
  background: var(--surface2);
  border-radius: var(--r-full);
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  width: 0;
  border-radius: var(--r-full);
  background: linear-gradient(90deg, var(--b600), var(--b400));
  transition: width 1.3s cubic-bezier(.25,.46,.45,.94);
}


/* ─── 14. SECTION HELPERS ────────────────────────────────── */
.section {
  padding-block: 5rem;
}

.bg-surface { background: var(--surface); }

.section-hdr {
  text-align: center;
  margin-bottom: 3rem;
}
.section-hdr h2 {
  font-size: clamp(1.7rem, 3.5vw, 2.4rem);
  margin-bottom: .75rem;
}
.section-hdr p {
  font-size: 1rem;
  max-width: 560px;
  margin-inline: auto;
}


/* ─── 15. CARDS GRID ─────────────────────────────────────── */
.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.25rem;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 1.6rem;
}

.card-hover {
  transition:
    transform   var(--dur) var(--ease),
    box-shadow  var(--dur) var(--ease),
    border-color var(--dur) var(--ease);
}
.card-hover:hover {
  transform: translateY(-3px);
  box-shadow: var(--sh-md);
  border-color: var(--b200);
}

.card-dark {
  background: linear-gradient(145deg, var(--b700), var(--b900));
  border-color: transparent;
  box-shadow: var(--sh-md);
}
.card-dark h3 { color: #fff; }
.card-dark p  { color: rgba(255,255,255,.8); }
.card-dark .card-icon { background: rgba(255,255,255,.15); }

.card-icon {
  font-size: 1.8rem;
  width: 52px;
  height: 52px;
  border-radius: var(--r-lg);
  background: var(--primary-lite);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1rem;
}

.card h3 { font-size: 1rem;  margin-bottom: .5rem; }
.card p  { font-size: .88rem; line-height: 1.7; }


/* ─── 16. STEPS ROW ──────────────────────────────────────── */
.steps-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
  position: relative;
}

/* Connecting line */
.steps-row::before {
  content: '';
  position: absolute;
  top: 23px;
  inset-inline-start: calc(100% / 6);
  inset-inline-end: calc(100% / 6);
  height: 2px;
  background: linear-gradient(90deg, var(--b200), var(--border), var(--b200));
  z-index: 0;
}

.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  position: relative;
  z-index: 1;
}

.step-num {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  font-size: 1.1rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(44,94,232,.3);
  margin-bottom: 1rem;
}

.step-icon {
  font-size: 1.55rem;
  width: 46px;
  height: 46px;
  border-radius: var(--r-lg);
  background: var(--primary-lite);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-inline: auto;
  margin-bottom: .85rem;
}

.step h3 { font-size: 1rem;  margin-bottom: .4rem; }
.step p  { font-size: .88rem; }


/* ─── 17. FAQ ACCORDION ──────────────────────────────────── */
.faq-list {
  max-width: 740px;
  margin-inline: auto;
  display: flex;
  flex-direction: column;
  gap: .6rem;
}

.faq-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  transition: box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.faq-item[open] {
  border-color: var(--b200);
  box-shadow: var(--sh-sm);
}

.faq-q {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 1.1rem 1.25rem;
  cursor: pointer;
  font-size: .95rem;
  font-weight: 600;
  color: var(--text);
  transition: background var(--dur) var(--ease);
  user-select: none;
}
.faq-q:hover { background: var(--n50); }

.faq-chevron {
  flex-shrink: 0;
  color: var(--text3);
  transition: transform var(--dur) var(--ease);
}
.faq-item[open] .faq-chevron { transform: rotate(180deg); }

.faq-body {
  padding: 0 1.25rem 1.1rem;
  border-top: 1px solid var(--border);
}
.faq-body p {
  font-size: .92rem;
  padding-top: .75rem;
  line-height: 1.8;
}


/* ─── 18. CTA BAND ───────────────────────────────────────── */
.cta-band {
  position: relative;
  background: linear-gradient(140deg, var(--b700) 0%, var(--b900) 100%);
  text-align: center;
  padding-block: 5rem;
  overflow: hidden;
}

.cta-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(
    ellipse 60% 80% at 50% 0%,
    rgba(91,140,248,.28) 0%,
    transparent 70%
  );
}

.cta-inner {
  position: relative;
  z-index: 1;
}

.cta-band h2 {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  color: #fff;
  margin-bottom: .85rem;
}
.cta-band p {
  color: rgba(255,255,255,.72);
  font-size: 1rem;
  max-width: 480px;
  margin-inline: auto;
  margin-bottom: 2rem;
}

.cta-btns {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 1.25rem;
}

.cta-fine {
  font-size: .78rem;
  color: rgba(255,255,255,.38);
  margin: 0;
}


/* ─── 19. FOOTER ─────────────────────────────────────────── */
.site-footer {
  background: var(--n900);
  color: rgba(255,255,255,.5);
  padding-block: 3rem 1.5rem;
}

.footer-inner {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 3rem;
  margin-bottom: 2.5rem;
}

.footer-brand-logo {
  font-size: 1.15rem;
  font-weight: 900;
  color: #fff;
  margin-bottom: .5rem;
}

.footer-brand p {
  font-size: .85rem;
  max-width: 260px;
  color: rgba(255,255,255,.45);
}

.footer-col h4 {
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
  margin-bottom: .9rem;
}

.footer-col ul {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}

.footer-col a {
  font-size: .87rem;
  color: rgba(255,255,255,.5);
  transition: color var(--dur) var(--ease);
}
.footer-col a:hover { color: #fff; }

.footer-bottom {
  border-top: 1px solid rgba(255,255,255,.07);
  padding-top: 1.25rem;
  text-align: center;
}
.footer-bottom p {
  font-size: .8rem;
  color: rgba(255,255,255,.25);
}


/* ─── 20. TOAST NOTIFICATIONS ────────────────────────────── */
#toast-container {
  position: fixed;
  bottom: 1.5rem;
  inset-inline-end: 1.5rem;
  z-index: 9998;
  display: flex;
  flex-direction: column;
  gap: .5rem;
  pointer-events: none;
}

.toast {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .7rem 1.1rem;
  border-radius: var(--r-lg);
  box-shadow: var(--sh-lg);
  font-size: .87rem;
  font-weight: 500;
  min-width: 240px;
  max-width: 360px;
  pointer-events: all;
  animation: toast-in .25s ease forwards;
}

@keyframes toast-in  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
@keyframes toast-out { from { opacity:1; } to { opacity:0; transform:translateY(8px); } }
.toast.leaving { animation: toast-out .22s ease forwards; }

.toast-info    { background:#0f172a; color:#93c5fd; border:1px solid var(--b700); }
.toast-success { background:#0f2a10; color:#86efac; border:1px solid var(--green-d); }
.toast-warn    { background:#2d2010; color:#fcd34d; border:1px solid var(--yellow-d); }
.toast-error   { background:#2d1010; color:#fca5a5; border:1px solid var(--red-d); }

.toast-x {
  margin-inline-start: auto;
  opacity: .55;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  flex-shrink: 0;
}
.toast-x:hover { opacity: 1; }


/* ─── 21. SCROLL REVEAL ──────────────────────────────────── */
.reveal {
  opacity: 0;
  transform: translateY(22px);
  transition:
    opacity   .45s ease,
    transform .5s  cubic-bezier(.25,.46,.45,.94);
}
.reveal.in-view {
  opacity: 1;
  transform: none;
}

/* Stagger siblings automatically */
.reveal:nth-child(2) { transition-delay: .07s; }
.reveal:nth-child(3) { transition-delay: .14s; }
.reveal:nth-child(4) { transition-delay: .21s; }
.reveal:nth-child(5) { transition-delay: .28s; }


/* ─── 22. RESPONSIVE BREAKPOINTS ────────────────────────── */

/* ≤1024px — 2-col cards, 2-col footer */
@media (max-width: 1024px) {
  .grid-4 {
    grid-template-columns: repeat(2, 1fr);
  }
  .footer-inner {
    grid-template-columns: 1fr 1fr;
  }
  .footer-brand {
    grid-column: 1 / -1;
  }
}

/* ≤768px — mobile layout */
@media (max-width: 768px) {
  /* ── Nav: full-width flex row, logo and burger at opposite edges ──
     Switch from 3-col grid to flex justify-between so the two
     remaining elements (logo + burger) automatically occupy opposite
     ends of the full header width regardless of RTL/LTR direction.
     In RTL: logo on right, burger on left  (browser handles it).
     In LTR: logo on left,  burger on right (browser handles it).
  */
  .nav-inner {
    display: flex;
    justify-content: space-between;   /* push logo and burger to opposite edges */
    align-items: center;
    width: 100%;
    padding-inline: 1.25rem;          /* comfortable side padding (≈px-5) */
  }

  /* Remove the inner column padding that was only for desktop grid gaps */
  .nav-col-logo    { padding-inline-end: 0; }
  .nav-col-actions { padding-inline-start: 0; }

  /* Hide center column and desktop-only items */
  .nav-col-links       { display: none; }
  .nav-desktop-only    { display: none !important; }

  /* Show burger; ensure it has a comfortable 44×44 tap target */
  .nav-mobile-only     { display: flex; }
  .burger {
    min-width: 44px;
    min-height: 44px;
    align-items: center;
    justify-content: center;
    padding: .6rem;                   /* extra padding enlarges hit area */
  }

  /* Hero stacks vertically */
  .hero-grid {
    grid-template-columns: 1fr;
    gap: 2.5rem;
    padding-block: 3rem;
    text-align: center;
  }
  .hero-copy    { align-items: center; }
  .hero-sub     { max-width: 100%; }
  .hero-btns    { justify-content: center; }
  .trust-row    { justify-content: center; }

  /* Hide visual card on small screens */
  .hero-visual  { display: none; }

  /* Single column grids */
  .grid-4       { grid-template-columns: 1fr; }
  .steps-row    { grid-template-columns: 1fr; gap: 1.5rem; }
  .steps-row::before { display: none; }
}

/* ≤480px — tighter spacing */
@media (max-width: 480px) {
  .container       { padding-inline: 1.1rem; }
  .section         { padding-block: 3.5rem; }
  .btn-lg          { padding: .75rem 1.5rem; font-size: 1rem; }
  .footer-inner    { grid-template-columns: 1fr; gap: 2rem; }
  #toast-container { inset-inline-end: .75rem; bottom: .75rem; }
}


/* ─── 23. LTR OVERRIDES ──────────────────────────────────── */
/* In LTR mode, hero copy aligns to left */
[dir="ltr"] .hero-copy  { align-items: flex-start; }
[dir="ltr"] .trust-row  { justify-content: flex-start; }
[dir="ltr"] .hero-btns  { justify-content: flex-start; }

@media (max-width: 768px) {
  [dir="ltr"] .hero-copy  { align-items: center; }
  [dir="ltr"] .trust-row  { justify-content: center; }
  [dir="ltr"] .hero-btns  { justify-content: center; }
}

  

/* ═══════════════════════════════════════════════════════════
   GUEST MODE — Additional Styles
   ═══════════════════════════════════════════════════════════ */

/* ─── Guest Banner ───────────────────────────────────────── */
.guest-banner {
  display: none;               /* shown by JS when mode=guest */
  position: fixed;
  top: var(--nav-h);
  inset-inline: 0;
  z-index: 800;
  background: linear-gradient(90deg, var(--b700), var(--b600));
  color: #fff;
  font-size: .82rem;
  font-weight: 600;
  text-align: center;
  padding: .42rem 1rem;
  letter-spacing: .01em;
}

.guest-banner.visible { display: flex; align-items: center; justify-content: center; gap: .75rem; }

.guest-banner-chip {
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: var(--r-full);
  padding: .15rem .7rem;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .05em;
}

.guest-banner-cta {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.5);
  color: #fff;
  border-radius: var(--r-full);
  padding: .2rem .9rem;
  font-size: .75rem;
  font-weight: 700;
  cursor: pointer;
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  white-space: nowrap;
}
.guest-banner-cta:hover { background: rgba(255,255,255,.28); border-color: rgba(255,255,255,.8); }

/* Offset body when guest banner is visible */
body.guest-active { padding-top: calc(var(--nav-h) + 34px); }
body.guest-active .hero { padding-block-start: 0; }

/* ─── Guest Preview Section ──────────────────────────────── */
#guest-preview {
  display: none;
  padding-block: 4rem;
  background: linear-gradient(160deg, var(--b50) 0%, var(--n0) 60%);
  border-top: 1px solid var(--b100);
}
#guest-preview.visible { display: block; }

.guest-preview-hdr {
  text-align: center;
  margin-bottom: 2.5rem;
}
.guest-preview-hdr h2 { font-size: clamp(1.5rem, 3vw, 2.1rem); margin-bottom: .5rem; }
.guest-preview-hdr p  { font-size: .95rem; max-width: 520px; margin-inline: auto; }

/* Tab switcher */
.preview-tabs {
  display: flex;
  gap: .5rem;
  justify-content: center;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.tab-btn {
  padding: .5rem 1.3rem;
  border-radius: var(--r-full);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: .87rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.tab-btn:hover    { border-color: var(--b300); color: var(--primary); }
.tab-btn.active   { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 14px rgba(44,94,232,.3); }

/* Tab panels */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Opportunity Radar Preview */
.radar-list {
  display: flex;
  flex-direction: column;
  gap: .75rem;
  max-width: 680px;
  margin-inline: auto;
}

.radar-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  transition: box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.radar-item:hover { box-shadow: var(--sh-sm); transform: translateY(-1px); }

.radar-item-icon {
  font-size: 1.4rem;
  width: 44px;
  height: 44px;
  background: var(--primary-lite);
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.radar-item-body { flex: 1; min-width: 0; }
.radar-item-body h4 { font-size: .92rem; font-weight: 700; margin-bottom: .15rem; }
.radar-item-body p  { font-size: .78rem; color: var(--text3); line-height: 1.4; }

.radar-item-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .3rem;
  flex-shrink: 0;
}
.radar-item-date {
  font-size: .72rem;
  color: var(--text3);
  white-space: nowrap;
}

/* Roadmap Preview */
.roadmap-preview {
  max-width: 700px;
  margin-inline: auto;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.roadmap-year {
  display: flex;
  gap: 1.25rem;
  position: relative;
}

.roadmap-year::before {
  content: '';
  position: absolute;
  inset-inline-start: 19px;
  top: 44px;
  bottom: -1px;
  width: 2px;
  background: var(--border);
  z-index: 0;
}
.roadmap-year:last-child::before { display: none; }

.roadmap-dot {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .8rem;
  font-weight: 800;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  box-shadow: 0 0 0 4px var(--b100);
  margin-top: .2rem;
}

.roadmap-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 1.25rem;
  flex: 1;
}
.roadmap-content h4 { font-size: .95rem; font-weight: 700; margin-bottom: .5rem; }
.roadmap-content ul { display: flex; flex-direction: column; gap: .3rem; }
.roadmap-content ul li {
  font-size: .82rem;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: .5rem;
}
.roadmap-content ul li::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--b300);
  flex-shrink: 0;
}

/* Blur overlay for locked content in preview */
.preview-lock-overlay {
  position: relative;
  overflow: hidden;
  border-radius: var(--r-lg);
}
.preview-lock-overlay::after {
  content: '';
  position: absolute;
  inset: 0;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  background: rgba(248,250,252,.7);
  border-radius: var(--r-lg);
}
.preview-lock-badge {
  position: absolute;
  top: 50%;
  inset-inline-start: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .5rem;
  text-align: center;
}
.preview-lock-badge svg { color: var(--text3); }
.preview-lock-badge p { font-size: .8rem; color: var(--text2); font-weight: 600; }

/* Guest upgrade CTA inside preview */
.guest-upgrade-row {
  text-align: center;
  margin-top: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .75rem;
}
.guest-upgrade-row p { font-size: .85rem; color: var(--text3); }


/* ─── Features Section with Locked Cards ────────────────── */
.features-section {
  padding-block: 5rem;
  background: var(--surface);
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.25rem;
}

.feature-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 1.75rem;
  display: flex;
  flex-direction: column;
  gap: .85rem;
  position: relative;
  transition: box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.feature-card:hover { box-shadow: var(--sh-sm); transform: translateY(-2px); border-color: var(--b200); }

.feature-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: .75rem;
}

.feature-card-icon {
  font-size: 1.6rem;
  width: 50px;
  height: 50px;
  background: var(--primary-lite);
  border-radius: var(--r-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.feature-card.unlocked .feature-card-icon { background: var(--green-l); }

/* Lock badge */
.lock-badge {
  display: flex;
  align-items: center;
  gap: .3rem;
  background: var(--n100);
  border: 1px solid var(--n200);
  border-radius: var(--r-full);
  padding: .22rem .65rem;
  font-size: .68rem;
  font-weight: 700;
  color: var(--n500);
  white-space: nowrap;
  flex-shrink: 0;
}
.lock-badge svg { flex-shrink: 0; }

/* Unlock badge (visible in account mode) */
.unlock-badge {
  display: none;
  align-items: center;
  gap: .3rem;
  background: var(--green-l);
  border: 1px solid var(--green-d);
  border-radius: var(--r-full);
  padding: .22rem .65rem;
  font-size: .68rem;
  font-weight: 700;
  color: var(--green-d);
  white-space: nowrap;
  flex-shrink: 0;
}

/* Preview badge (guest-accessible) */
.preview-badge {
  display: flex;
  align-items: center;
  gap: .3rem;
  background: var(--b100);
  border: 1px solid var(--b200);
  border-radius: var(--r-full);
  padding: .22rem .65rem;
  font-size: .68rem;
  font-weight: 700;
  color: var(--b700);
  white-space: nowrap;
  flex-shrink: 0;
}

.feature-card h3 { font-size: 1.05rem; margin: 0; }
.feature-card p  { font-size: .87rem; line-height: 1.7; margin: 0; flex: 1; }

/* Feature card action button */
.feature-card-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .45rem;
  padding: .55rem 1.2rem;
  border-radius: var(--r-md);
  font-size: .87rem;
  font-weight: 600;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  align-self: flex-start;
  font-family: inherit;
}

.feature-card-btn.btn-locked {
  background: var(--n100);

.feature-card-btn.btn-preview {

/* ─── Modal Base ─────────────────────────────────────────── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(15,23,42,.55);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--r-2xl);
  box-shadow: var(--sh-lg);
  width: 100%;
  max-width: 460px;
  max-height: 92vh;
  overflow-y: auto;
  animation: modal-in .2s cubic-bezier(.34,1.56,.64,1) forwards;
}

@keyframes modal-in {
  from { opacity: 0; transform: scale(.94) translateY(8px); }
  to   { opacity: 1; transform: none; }
}

.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  padding: 1.5rem 1.5rem .75rem;
  border-bottom: 1px solid var(--border);
}

.modal-header h3 { font-size: 1.15rem; margin: 0; line-height: 1.3; }
.modal-header p  { font-size: .85rem; color: var(--text2); margin: .3rem 0 0; }

.modal-close {
  width: 32px;
  height: 32px;
  border-radius: var(--r-sm);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text3);
  flex-shrink: 0;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  font-family: inherit;
  font-size: 1.1rem;
  border: none;
}
.modal-close:hover { background: var(--n200); color: var(--text); }

.modal-body { padding: 1.25rem 1.5rem; }

/* Lock modal specifics */
.lock-feature-list {
  display: flex;
  flex-direction: column;
  gap: .45rem;
  margin: 1rem 0 1.5rem;
}
.lock-feature-item {
  display: flex;
  align-items: center;
  gap: .6rem;
  font-size: .88rem;
  color: var(--text2);
}
.lock-feature-item svg { color: var(--text3); flex-shrink: 0; }

.modal-actions {
  display: flex;
  flex-direction: column;
  gap: .6rem;
  margin-top: 1.25rem;
}
.modal-actions .btn { width: 100%; justify-content: center; }

/* Signup modal specifics */
.form-field {
  display: flex;
  flex-direction: column;
  gap: .35rem;
  margin-bottom: 1rem;
}
.form-field label {
  font-size: .83rem;
  font-weight: 600;
  color: var(--text2);
}
.form-field input {
  padding: .65rem .9rem;
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  background: var(--bg);
  color: var(--text);
  font-size: .92rem;
  font-family: inherit;
  transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  outline: none;
}
.form-field input:focus {
  border-color: var(--b400);
  box-shadow: 0 0 0 3px rgba(91,140,248,.15);
}
.form-field input::placeholder { color: var(--text3); }

.form-optional {
  font-size: .75rem;
  color: var(--text3);
  font-weight: 400;
}

.form-divider {
  text-align: center;
  font-size: .78rem;
  color: var(--text3);
  margin: .5rem 0;
  position: relative;
}
.form-divider::before,
.form-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 38%;
  height: 1px;
  background: var(--border);
}
.form-divider::before { inset-inline-start: 0; }
.form-divider::after  { inset-inline-end: 0; }

.btn-ghost-sm {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text2);
  width: 100%;
  padding: .6rem 1rem;
  border-radius: var(--r-md);
  font-size: .87rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  font-family: inherit;
}
.btn-ghost-sm:hover { background: var(--surface2); border-color: var(--n300); color: var(--text); }


/* ─── Responsive ─────────────────────────────────────────── */
@media (max-width: 768px) {
  .features-grid { grid-template-columns: 1fr; }
  .modal { max-width: 100%; border-radius: var(--r-xl); }
  .guest-banner { font-size: .75rem; }
  .preview-tabs { gap: .4rem; }
  .tab-btn { padding: .45rem 1rem; font-size: .82rem; }
}

@media (max-width: 480px) {
  .radar-item-meta { display: none; }
  .roadmap-dot { width: 32px; height: 32px; font-size: .72rem; }
}

/* ═══════════════════════════════════════════════════════════
   SECTION 2 — LANGUAGE MANAGER
   Handles reading/writing the lang preference, translating
   all [data-i18n] elements, and flipping RTL/LTR.
   ═══════════════════════════════════════════════════════════ */
const Lang = (() => {
  const STORAGE_KEY = 'tadarruj_lang';
  let current = 'ar';

  /**
   * Translate every element that has a data-i18n attribute.
   * The attribute value is the key in T[lang].
   */
  function translateDOM(lang) {
    const dict = T[lang] || T.ar;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (Object.prototype.hasOwnProperty.call(dict, key)) {
        el.textContent = dict[key];
      }
    });
  }

  /**
   * Apply a language to the page.
   * @param {string}  lang     - 'ar' or 'en'
   * @param {boolean} animate  - whether to fade body during switch
   */
  function apply(lang, animate = true) {
    current = lang;
    localStorage.setItem(STORAGE_KEY, lang);

    const html = document.documentElement;

    // Fade transition when user toggles (not on initial load)
    if (animate) {
      document.body.style.transition = 'opacity .15s ease';
      document.body.style.opacity   = '0';
    }

    // Apply direction and lang attributes
    html.setAttribute('lang', lang === 'ar' ? 'ar' : 'en');
    html.setAttribute('dir',  lang === 'ar' ? 'rtl' : 'ltr');
    document.title = lang === 'ar' ? 'تدرج | Tadarruj' : 'Tadarruj | تدرج';

    // Translate all data-i18n elements
    translateDOM(lang);
    if (typeof translatePlaceholders === 'function') translatePlaceholders(lang);

    // Update the lang-toggle button label (desktop + mobile)
    const langBtn = document.getElementById('lang-btn');
    if (langBtn) langBtn.textContent = (T[lang] || T.ar).lang_btn;
    const mobileLangBtn = document.getElementById('lang-btn-mobile');
    if (mobileLangBtn) mobileLangBtn.textContent = (T[lang] || T.ar).lang_btn;

    if (animate) {
      // Re-show body after next frame so the transition is visible
      requestAnimationFrame(() => {
        document.body.style.opacity = '1';
      });
    }
  }

  /** Toggle between ar and en */
  function toggle() {
    apply(current === 'ar' ? 'en' : 'ar', true);
  }

  /** Read preference from localStorage (default: 'ar') */
  function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    current = saved === 'en' ? 'en' : 'ar';
    apply(current, false);   // no fade on first load
  }

  /** Expose current lang for external checks */
  function getCurrent() { return current; }

  return { init, toggle, getCurrent };
})();




/* ═══════════════════════════════════════════════════════════
   SECTION 4 — NAVBAR
   • Adds .scrolled class for border/shadow on scroll
   • Highlights active nav link via IntersectionObserver
   ═══════════════════════════════════════════════════════════ */
function initNavbar() {
  const header = document.getElementById('nav-header');
  if (!header) return;

  // Scroll shadow
  window.addEventListener(
    'scroll',
    () => header.classList.toggle('scrolled', window.scrollY > 12),
    { passive: true }
  );

  // Active link on scroll
  const sections = document.querySelectorAll('section[id]');
  const links    = document.querySelectorAll('.nav-links .nav-link[href^="#"]');

  if (sections.length && links.length) {
    const observer = new IntersectionObserver(
      entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            links.forEach(a => a.classList.remove('active'));
            const match = document.querySelector(
              `.nav-links .nav-link[href="#${entry.target.id}"]`
            );
            if (match) match.classList.add('active');
          }
        });
      },
      {
        rootMargin: `-${header.offsetHeight}px 0px -55% 0px`,
      }
    );
    sections.forEach(s => observer.observe(s));
  }
}


/* ═══════════════════════════════════════════════════════════
   SECTION 5 — MOBILE DRAWER (hamburger menu)
   Improvements over original:
   • Body scroll lock (body.drawer-open class)
   • Backdrop element for clean outside-click detection
   • Syncs mobile lang-btn text with desktop lang-btn
   • ESC closes
   • All links close on click
   • Wires mobile lang button to Lang.toggle()
   ═══════════════════════════════════════════════════════════ */
function initMobileDrawer() {
  const burger   = document.getElementById('burger');
  const drawer   = document.getElementById('mobile-drawer');
  const backdrop = document.getElementById('drawer-backdrop');
  if (!burger || !drawer) return;

  // Compute scrollbar width once to prevent layout jump on lock
  const scrollbarW = window.innerWidth - document.documentElement.clientWidth;
  document.documentElement.style.setProperty('--scrollbar-w', scrollbarW + 'px');

  function closeDrawer() {
    drawer.classList.remove('open');
    if (backdrop) backdrop.classList.remove('open');
    burger.setAttribute('aria-expanded', 'false');
    drawer.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('drawer-open');
  }

  function openDrawer() {
    drawer.classList.add('open');
    if (backdrop) backdrop.classList.add('open');
    burger.setAttribute('aria-expanded', 'true');
    drawer.setAttribute('aria-hidden', 'false');
    document.body.classList.add('drawer-open');
    // Focus first link for accessibility
    const firstLink = drawer.querySelector('a, button');
    if (firstLink) firstLink.focus();
  }

  burger.addEventListener('click', () => {
    drawer.classList.contains('open') ? closeDrawer() : openDrawer();
  });

  // Close when a nav link is clicked
  drawer.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', closeDrawer);
  });

  // Backdrop click → close
  if (backdrop) backdrop.addEventListener('click', closeDrawer);

  // ESC → close
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
  });

  // Mobile lang button → same behavior as desktop lang button
  const mobileLangBtn = document.getElementById('lang-btn-mobile');
  if (mobileLangBtn) {
    mobileLangBtn.addEventListener('click', () => {
      Lang.toggle();
      // Don't close drawer — user might want to keep browsing
    });
  }
}


/* ═══════════════════════════════════════════════════════════
   SECTION 6 — SMOOTH ANCHOR SCROLL
   Offsets scrollTop by the fixed navbar height.
   ═══════════════════════════════════════════════════════════ */
function initSmoothScroll() {
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      const id = a.getAttribute('href');
      if (!id || id === '#') return;
      const target = document.querySelector(id);
      if (!target) return;

      e.preventDefault();

      // Read nav height from CSS custom property (keeps single source of truth)
      const navH =
        parseInt(
          getComputedStyle(document.documentElement).getPropertyValue('--nav-h'),
          10
        ) || 64;

      const top =
        target.getBoundingClientRect().top + window.scrollY - navH - 8;

      window.scrollTo({ top, behavior: 'smooth' });
    });
  });
}


/* ═══════════════════════════════════════════════════════════
   SECTION 7 — PROGRESS BAR ANIMATION
   Reads data-pct on .prog-fill elements, then sets width.
   Uses IntersectionObserver so animation triggers on scroll.
   ═══════════════════════════════════════════════════════════ */
function initProgressBars() {
  const bars = document.querySelectorAll('.prog-fill[data-pct]');
  if (!bars.length) return;

  const observer = new IntersectionObserver(
    entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const pct = parseInt(entry.target.getAttribute('data-pct'), 10);
          if (!Number.isNaN(pct)) {
            // Small delay makes the animation clearly visible
            setTimeout(() => {
              entry.target.style.width = pct + '%';
            }, 250);
          }
          observer.unobserve(entry.target);
        }
      });
    },
    { threshold: 0.4 }
  );

  bars.forEach(bar => observer.observe(bar));
}


/* ═══════════════════════════════════════════════════════════
   SECTION 8 — SCROLL REVEAL
   Adds .in-view to .reveal elements as they enter viewport.
   ═══════════════════════════════════════════════════════════ */
function initScrollReveal() {
  const elements = document.querySelectorAll('.reveal');
  if (!elements.length) return;

  const observer = new IntersectionObserver(
    entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          observer.unobserve(entry.target);
        }
      });
    },
    { threshold: 0.1 }
  );

  elements.forEach(el => observer.observe(el));
}


/* ═══════════════════════════════════════════════════════════
   SECTION 9 — FAQ ACCORDION
   Auto-closes other open items when one is opened.
   Native <details> handles the toggle itself; we just hook in.
   ═══════════════════════════════════════════════════════════ */
function initFAQ() {
  const items = document.querySelectorAll('.faq-item');
  items.forEach(item => {
    item.addEventListener('toggle', () => {
      if (item.open) {
        items.forEach(other => {
          if (other !== item && other.open) {
            other.removeAttribute('open');
          }
        });
      }
    });
  });
}


/* ═══════════════════════════════════════════════════════════
   SECTION 10 — TOAST HELPER  (utility, available globally)
   Usage: Toast.success('Saved!') / Toast.error('Oops')
   ═══════════════════════════════════════════════════════════ */
const Toast = (() => {
  function show(message, type = 'info', duration = 3500) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML =
      `<span>${message}</span>` +
      `<span class="toast-x" role="button" aria-label="Dismiss" tabindex="0">✕</span>`;

    const dismiss = () => {
      el.classList.add('leaving');
      el.addEventListener('animationend', () => el.remove(), { once: true });
    };

    el.querySelector('.toast-x').addEventListener('click', dismiss);
    el.querySelector('.toast-x').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') dismiss();
    });

    container.appendChild(el);
    setTimeout(dismiss, duration);
  }

  return {
    show,
    success: (m, d) => show(m, 'success', d),
    info:    (m, d) => show(m, 'info',    d),
    warn:    (m, d) => show(m, 'warn',    d),
    error:   (m, d) => show(m, 'error',   d),
  };
})();


/* ═══════════════════════════════════════════════════════════
   BOOT — runs after DOM is ready (script has defer attribute)
   ═══════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {

  /*
    ORDER MATTERS:
    1. Lang.init() must run first — it writes all [data-i18n]
       text before anything else renders.
    2. Asset badge next — checks CSS immediately after DOM ready.
    3. Everything else in any order.
  */

  // 1. Apply saved language (translates all data-i18n elements)
  Lang.init();

  // 2. Wire up the lang-toggle button
  const langBtn = document.getElementById('lang-btn');
  if (langBtn) {
    langBtn.addEventListener('click', () => Lang.toggle());
  }


  // 4. Navbar interactions
  initNavbar();

  // 5. Mobile drawer
  initMobileDrawer();

  // 6. Smooth scroll
  initSmoothScroll();

  // 7. Progress bars
  initProgressBars();

  // 8. Scroll reveal
  initScrollReveal();

  // 9. FAQ accordion
  initFAQ();

  // 10. Modal manager
  Modal.init();

  // 11. App mode (guest/account state)
  AppMode.init();

  // 12. Guest mode interactions
  initGuestMode();

  // 13. Signup flow
  initSignup();

  // 14. Translate input placeholders on load
  translatePlaceholders(Lang.getCurrent());

  window.Toast = Toast;
});

  

/* ═══════════════════════════════════════════════════════════
   SECTION 11 — APP MODE (Guest / Account)
   ═══════════════════════════════════════════════════════════ */
const AppMode = (() => {
  const KEY = 'tadarruj_mode';

  function get() {
    return localStorage.getItem(KEY) || null;
  }

  function set(mode) {
    localStorage.setItem(KEY, mode);
    applyUI(mode);
  }

  function applyUI(mode) {
    const banner  = document.getElementById('guest-banner');
    const preview = document.getElementById('guest-preview');
    const isGuest   = mode === 'guest';
    const isAccount = mode === 'account';

    document.body.classList.toggle('guest-active',   isGuest);
    document.body.classList.toggle('account-active', isAccount);

    if (banner)  banner.classList.toggle('visible', isGuest);
    if (preview && isGuest) preview.classList.add('visible');

    if (isAccount) {
      const lang = Lang.getCurrent();
      const dict = T[lang] || T.ar;
      document.querySelectorAll('.js-locked-btn').forEach(btn => {
        btn.textContent = dict['feat_btn_active'] || (lang === 'ar' ? 'افتح الميزة' : 'Open Feature');
        btn.classList.remove('btn-locked');
        btn.classList.add('btn-active');
      });
    }
  }

  function init() {
    // Check localStorage for a confirmed profile (survives page reload)
    let stored;
    try { stored = JSON.parse(localStorage.getItem('tadarruj_profile') || 'null'); } catch(e) {}
    if (stored && stored.confirmed) {
      localStorage.setItem(KEY, 'account');
    }
    const mode = get();
    if (mode) applyUI(mode);
  }

  return { get, set, applyUI, init };
})();


/* ═══════════════════════════════════════════════════════════
   SECTION 12 — MODAL MANAGER
   ═══════════════════════════════════════════════════════════ */
const Modal = (() => {
  let _active = null;

  function open(id) {
    const el = document.getElementById(id);
    if (!el) return;
    if (_active && _active !== el) close(_active.id);
    el.classList.add('open');
    document.body.style.overflow = 'hidden';
    _active = el;
    requestAnimationFrame(() => {
      const f = el.querySelector('button, input, [tabindex="0"]');
      if (f) f.focus();
    });
  }

  function close(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('open');
    document.body.style.overflow = '';
    if (_active === el) _active = null;
  }

  function closeAll() {
    document.querySelectorAll('.modal-backdrop.open').forEach(m => m.classList.remove('open'));
    document.body.style.overflow = '';
    _active = null;
  }

  function init() {
    document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
      backdrop.addEventListener('click', e => { if (e.target === backdrop) closeAll(); });
    });
    document.querySelectorAll('[data-modal-close]').forEach(btn => {
      btn.addEventListener('click', () => close(btn.getAttribute('data-modal-close')));
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(); });
  }

  return { open, close, closeAll, init };
})();


/* ═══════════════════════════════════════════════════════════
   SECTION 13 — GUEST MODE CONTROLLER
   ═══════════════════════════════════════════════════════════ */
function initGuestMode() {

  // ── Hero "Explore as Guest" ──────────────────────────────────────────
  // Sets guest mode and opens the dashboard panel (in the modal) so the

  const heroGuestBtn = document.getElementById('hero-guest-btn');
  if (heroGuestBtn) {
    heroGuestBtn.addEventListener('click', e => {
      e.preventDefault();

      SignupFlow.renderGuestDashboard();

    });
  }

  // ── Guest banner CTA (top-of-page banner) ───────────────────────────
  const bannerCta = document.getElementById('guest-banner-cta');
  if (bannerCta) {
    bannerCta.addEventListener('click', () => {
      SignupFlow.resetForm();
      Modal.open('signup-modal');
    });
  }

  // ── Locked feature buttons → guest-restricted modal ─────────────────
  document.querySelectorAll('.js-locked-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (AppMode.get() === 'account') return;
      Modal.open('lock-modal');
    });

  const lockToSignup = document.getElementById('lock-to-signup');

      Modal.close('lock-modal');
      SignupFlow.resetForm();
      Modal.open('signup-modal');
    });
  }

  // ── Guest-restricted modal: "Log In" ────────────────────────────────
  const lockToLogin = document.getElementById('lock-to-login');
  if (lockToLogin) {
    lockToLogin.addEventListener('click', () => {
      Modal.close('lock-modal');
      SignupFlow.showPanel('signup-panel-login');
      Modal.open('signup-modal');

/* ═══════════════════════════════════════════════════════════
   SECTION 14 — SIGNUP / AUTH FLOW
   ═══════════════════════════════════════════════════════════ */

/* ── Signup panel system ─────────────────────────────────── */
const SignupFlow = (() => {

  // In-memory profile store (simulates DB row)
  let _profile = null;
  let _pendingEmail = '';

  // City display names — resolved at render time from T dict
  const CITY_MAP = {
    riyadh:'city_riyadh', jeddah:'city_jeddah', mecca:'city_mecca',
    medina:'city_medina', dammam:'city_dammam', taif:'city_taif',
    tabuk:'city_tabuk', abha:'city_abha', other:'city_other',
  };
  const CAREER_MAP = {
    medicine:'career_medicine', engineering:'career_engineering',
    cs:'career_cs', business:'career_business', law:'career_law',
    education:'career_education', sciences:'career_sciences',
    arts:'career_arts', other:'career_other',
  };

  /* ── Panel switching ── */
  function showPanel(id) {
    document.querySelectorAll('.signup-panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById(id);
    if (panel) {
      panel.classList.add('active');
      // Focus first input
      requestAnimationFrame(() => {
        const first = panel.querySelector('input, select, button');
        if (first) first.focus();
      });
    }
  }

  /* ── Field validation helpers ── */
  function showErr(id, msg) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.classList.add('visible'); }
  }
  function clearErr(id) {
    const el = document.getElementById(id);
    if (el) { el.textContent = ''; el.classList.remove('visible'); }
  }
  function markField(inputId, errorId, hasError, msg) {
    const input = document.getElementById(inputId);
    if (hasError) {
      input && input.classList.add('input-error');
      showErr(errorId, msg);
    } else {
      input && input.classList.remove('input-error');
      clearErr(errorId);
    }
    return !hasError;
  }

  /* ── Signup form submission ── */
  function handleSignupSubmit() {
    const lang = Lang.getCurrent();
    const dict = T[lang] || T.ar;
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    const name   = (document.getElementById('signup-name')?.value  || '').trim();
    const email  = (document.getElementById('signup-email')?.value || '').trim();
    const grade  = document.getElementById('signup-grade')?.value  || '';
    const city   = document.getElementById('signup-city')?.value   || '';
    const career = document.getElementById('signup-career')?.value || '';

    let valid = true;
    valid = markField('signup-name',  'err-name',  name.length < 2,
      dict.signup_err_name  || 'Please enter your full name (at least 2 characters).') && valid;
    valid = markField('signup-email', 'err-email', !emailRe.test(email),
      dict.signup_err_email || 'Please enter a valid email address.') && valid;
    valid = markField('signup-grade', 'err-grade', !grade,
      dict.signup_err_grade || 'Please select your grade.') && valid;
    valid = markField('signup-city',  'err-city',  !city,
      dict.signup_err_city  || 'Please select your city.') && valid;

    if (!valid) return;

    // Store profile (simulates auth user creation + profile write)
    _profile = { name, email, grade, city, career, lang, createdAt: Date.now() };
    _pendingEmail = email;

    // Persist to localStorage (simulates confirmed auth session later)
    localStorage.setItem('tadarruj_profile', JSON.stringify({ ..._profile, confirmed: false }));

    // Show check-email panel
    const emailDisplay = document.getElementById('confirm-email-show');
    if (emailDisplay) emailDisplay.textContent = email;
    showPanel('signup-panel-confirm');
  }

  /* ── Login form submission ── */
  function handleLoginSubmit() {
    const lang = Lang.getCurrent();
    const dict = T[lang] || T.ar;
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const email = (document.getElementById('login-email')?.value || '').trim();

    if (!emailRe.test(email)) {
      markField('login-email', 'err-login-email', true,
        dict.login_err_email || 'Please enter a valid email address.');
      return;
    }

    // Check localStorage for a matching profile (simulates session check)
    let stored;
    try { stored = JSON.parse(localStorage.getItem('tadarruj_profile') || 'null'); } catch(e) {}

    if (stored && stored.email === email && stored.confirmed) {
      _profile = stored;
      AppMode.set('account');
      Modal.closeAll();
      Toast.success((T[lang] || T.ar).login_success || 'Logged in!', 4000);
    } else if (stored && stored.email === email && !stored.confirmed) {
      // Registered but not confirmed — send back to confirm screen
      _pendingEmail = email;
      const emailDisplay = document.getElementById('confirm-email-show');
      if (emailDisplay) emailDisplay.textContent = email;
      showPanel('signup-panel-confirm');
    } else {
      // No match — open signup with email pre-filled
      markField('login-email', 'err-login-email', true,
        (lang === 'ar' ? 'البريد الإلكتروني غير مسجّل.' : 'Email not found. Create an account?'));
    }
  }

  /* ── "I've confirmed" button ── */
  function handleConfirmCheck() {
    const lang = Lang.getCurrent();
    // Simulate email confirmation: mark as confirmed in localStorage
    let stored;
    try { stored = JSON.parse(localStorage.getItem('tadarruj_profile') || 'null'); } catch(e) {}
    if (stored) {
      stored.confirmed = true;
      localStorage.setItem('tadarruj_profile', JSON.stringify(stored));
      _profile = stored;
    } else if (_pendingEmail) {
      // Fallback if storage failed
      _profile = { email: _pendingEmail, confirmed: true };
    }

    AppMode.set('account');
    renderDashboardPanel();
    showPanel('signup-panel-dashboard');
  }

  /* ── Resend email (simulated) ── */
  function handleResend() {
    const lang = Lang.getCurrent();
    const dict = T[lang] || T.ar;
    Toast.success(dict.confirm_resent || '✅ Resent!', 4000);
  }

  /* ── Render dashboard panel with profile data ── */
  function renderDashboardPanel() {
    if (!_profile) return;
    const lang = Lang.getCurrent();
    const dict = T[lang] || T.ar;

    // Avatar initials
    const avatarEl = document.getElementById('dash-avatar-initials');
    if (avatarEl) {
      const initials = (_profile.name || 'U')
        .split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
      avatarEl.textContent = initials;
    }

    // Greeting
    const greetEl = document.getElementById('dash-greeting');
    if (greetEl) {
      const prefix = dict.dash_greeting_prefix || (lang === 'ar' ? 'مرحباً،' : 'Hello,');
      greetEl.textContent = prefix + ' ' + (_profile.name || '');
    }

    // Grade
    const gradeEl = document.getElementById('dash-grade-val');
    if (gradeEl) gradeEl.textContent = _profile.grade || '—';

    // City
    const cityEl = document.getElementById('dash-city-val');
    if (cityEl) {
      const cityKey = CITY_MAP[_profile.city];
      cityEl.textContent = (cityKey && dict[cityKey]) ? dict[cityKey] : (_profile.city || '—');
    }

    // Career
    const careerEl = document.getElementById('dash-career-val');
    if (careerEl) {
      const careerKey = CAREER_MAP[_profile.career];
      careerEl.textContent = (careerKey && dict[careerKey]) ? dict[careerKey] :
        (lang === 'ar' ? 'لم يُحدَّد' : 'Not specified');
    }
  }

  /* ── Render dashboard panel in guest mode (no profile) ── */
  function renderGuestDashboard() {
    const lang = Lang.getCurrent();
    const dict = T[lang] || T.ar;

    // Avatar: guest icon
    const avatarEl = document.getElementById('dash-avatar-initials');
    if (avatarEl) avatarEl.textContent = lang === 'ar' ? 'ض' : 'G';

    // Greeting
    const greetEl = document.getElementById('dash-greeting');
    if (greetEl) {
      greetEl.textContent = lang === 'ar'
        ? 'أهلاً بك في تدرج'
        : 'Welcome to Tadarruj';
    }

    // Stats: show "—" for guest
    ['dash-grade-val', 'dash-city-val', 'dash-career-val'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '—';
    });

    // Show guest banner, hide it for account mode (CSS also handles this)
    const guestBanner = document.getElementById('dash-guest-banner');
    if (guestBanner) {
      guestBanner.style.display = AppMode.get() === 'account' ? 'none' : '';
    }
  }

  /* ── "Explore tools" dismisses dashboard panel ── */
  function handleDashExplore() {
    Modal.closeAll();
    // Scroll to features section
    const featuresEl = document.getElementById('features');
    if (featuresEl) {
      const navH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h'), 10) || 64;
      window.scrollTo({ top: featuresEl.getBoundingClientRect().top + window.scrollY - navH - 8, behavior: 'smooth' });
    }
  }

  /* ── translatePlaceholders for selects (option text via data-i18n) ── */
  function translateSelectOptions(lang) {
    const dict = T[lang] || T.ar;
    document.querySelectorAll('select option[data-i18n]').forEach(opt => {
      const key = opt.getAttribute('data-i18n');
      if (dict[key]) opt.textContent = dict[key];
    });
  }

  /* ── Clear form fields when modal opens ── */
  function resetForm() {
    ['signup-name','signup-email','signup-grade','signup-city','signup-career'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = el.tagName === 'SELECT' ? '' : '';
    });
    ['err-name','err-email','err-grade','err-city'].forEach(clearErr);
    ['signup-name','signup-email','signup-grade','signup-city'].forEach(id => {
      document.getElementById(id)?.classList.remove('input-error');
    });
    showPanel('signup-panel-form');
  }

  function init() {
    // Open signup modal from all .js-open-signup triggers
    document.querySelectorAll('.js-open-signup').forEach(btn => {
      btn.addEventListener('click', () => {
        // Check if already logged in
        let stored;
        try { stored = JSON.parse(localStorage.getItem('tadarruj_profile') || 'null'); } catch(e) {}
        if (stored && stored.confirmed) {
          _profile = stored;
          AppMode.set('account');
          renderDashboardPanel();
          showPanel('signup-panel-dashboard');
        } else {
          resetForm();
        }
        Modal.open('signup-modal');
      });
    });

    // Signup form
    document.getElementById('signup-submit')?.addEventListener('click', handleSignupSubmit);
    document.getElementById('signup-name')?.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('signup-email')?.focus(); });
    document.getElementById('signup-email')?.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('signup-grade')?.focus(); });

    // Clear errors on input
    ['signup-name','signup-email','signup-grade','signup-city'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', () => {
        document.getElementById(id)?.classList.remove('input-error');
        const errId = 'err-' + id.replace('signup-', '');
        clearErr(errId);
      });
    });

    // Switch to login
    document.getElementById('signup-to-login')?.addEventListener('click', () => showPanel('signup-panel-login'));

    // Back to guest from signup
    document.getElementById('signup-back-guest')?.addEventListener('click', () => {
      Modal.close('signup-modal');
      if (AppMode.get() !== 'account') AppMode.set('guest');
    });

    // Login form
    document.getElementById('login-submit')?.addEventListener('click', handleLoginSubmit);
    document.getElementById('login-email')?.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-password')?.focus(); });
    document.getElementById('login-password')?.addEventListener('keydown', e => { if (e.key === 'Enter') handleLoginSubmit(); });

    // Switch to signup from login
    document.getElementById('login-to-signup')?.addEventListener('click', () => showPanel('signup-panel-form'));

    // Back to guest from login
    document.getElementById('login-back-guest')?.addEventListener('click', () => {
      Modal.close('signup-modal');
      if (AppMode.get() !== 'account') AppMode.set('guest');
    });

    // Check-email panel
    document.getElementById('confirm-check-btn')?.addEventListener('click', handleConfirmCheck);
    document.getElementById('confirm-resend-btn')?.addEventListener('click', handleResend);

    // Dashboard panel
    document.getElementById('dash-explore-btn')?.addEventListener('click', handleDashExplore);

    // Translate select options on init
    translateSelectOptions(Lang.getCurrent());

    // Re-translate select options when language changes
    const origToggle = Lang.toggle.bind(Lang);
    // We patch translatePlaceholders to also hit select options
    const _origTranslatePlaceholders = window.translatePlaceholders;
  }

  return { init, showPanel, renderDashboardPanel, renderGuestDashboard, translateSelectOptions, resetForm };
})();

function initSignup() {
  SignupFlow.init();

  // Also wire old guest-mode triggers (lock modal "create account" button) to open signup
  // These already call Modal.open('signup-modal') via initGuestMode — just reset the form
  const originalModalOpen = Modal.open.bind(Modal);
  const patchedOpen = function(id) {
    if (id === 'signup-modal') {
      let stored;
      try { stored = JSON.parse(localStorage.getItem('tadarruj_profile') || 'null'); } catch(e) {}
      if (!stored || !stored.confirmed) SignupFlow.resetForm();
    }
    originalModalOpen(id);
  };
  Modal.open = patchedOpen;
}

function translatePlaceholders(lang) {
  const dict = T[lang] || T.ar;
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (dict[key]) el.setAttribute('placeholder', dict[key]);
  });
  // Also translate select option text (data-i18n on <option>)
  document.querySelectorAll('select option[data-i18n]').forEach(opt => {
    const key = opt.getAttribute('data-i18n');
    if (dict[key]) opt.textContent = dict[key];
  });
}

<script>
// Override auth actions to redirect to React auth pages
document.addEventListener('DOMContentLoaded', () => {
  function hijack(selector, route) {
    document.querySelectorAll(selector).forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        window.parent.location.href = route;
      }, true);
    });
  }

  // All "ابدأ مجاناً" / signup buttons
  hijack('.js-open-signup', '/signup');
  hijack('#signup-submit', '/signup');
  hijack('#lock-to-signup', '/signup');
  hijack('#lock-cta-create', '/signup');

  // Login buttons
  hijack('#login-submit', '/login');
  hijack('#signup-to-login', '/login');
  hijack('#lock-cta-login', '/login');

  // "استكشف كضيف" → dashboard in guest mode
  const guestBtn = document.getElementById('hero-guest-btn');
  if (guestBtn) {
    guestBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      window.parent.location.href = '/dashboard?guest=1';
    }, true);
  }
});
</script>
